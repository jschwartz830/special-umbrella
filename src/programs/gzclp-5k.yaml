name: "Hybrid Strength + Run Base"
description: >
  7-day repeating hybrid plan aligned to an upper/lower + cardio/recovery split.
  Built for mixed equipment access with two upper sessions, two lower sessions,
  one base cardio day, and two recovery-focused days.

duration:
  type: weeks
  value: 36

vars:
  pull_ups_assist: 0
  bench: 135
  incline_db: 45
  squat: 185
  rdl: 155
  ohp: 95
  deadlift: 225
  hip_thrust: 185
  base_run_miles: 2.0

days:
  - label: "Upper A"
    slots:
      - type: weights
        name: "Upper A — Chest / Lats / Pull"
        focus: upper
        intent: hypertrophy
        durationMin: 60
        exercises:
          - exercise: "Pull-Ups"
            sets: 4
            reps: "6-10"
            load: pull_ups_assist
            rest: 120s
          - exercise: "Barbell Bench Press"
            sets: 3
            reps: "8-10"
            load: bench
            rest: 2m
            progress:
              if: all_reps
              then: "bench += 2.5"
          - exercise: "Dumbbell Incline Press"
            sets: 3
            reps: "10-12"
            load: incline_db
            rest: 90s
          - exercise: "Straight Arm Pulldown"
            sets: 3
            reps: "12-15"
            rest: 75s
          - exercise: "Band Pull Aparts"
            sets: 3
            reps: "15-20"
            rest: 60s
          - exercise: "Dumbbell Curls"
            sets: 2
            reps: "10-12"
            rest: 60s

  - label: "Cardio Base"
    slots:
      - type: run
        name: "Run / HIIT Base"
        subtype: easy
        durationMin: 30
        segments:
          - type: warmup
            duration: 5m
            pace: easy
          - type: easy
            distance: "base_run_miles mi"
            pace: easy
          - type: cooldown
            duration: 5m
            pace: easy
        progress:
          if: "effort <= 3"
          then: "base_run_miles = min(base_run_miles + 0.25, 10)"

  - label: "Lower A"
    slots:
      - type: weights
        name: "Lower A — Squat / Calves"
        focus: legs
        intent: strength
        durationMin: 65
        exercises:
          - exercise: "Barbell Squat"
            sets: 4
            reps: "6-8"
            load: squat
            rest: 3m
            progress:
              if: all_reps
              then: "squat += 5"
          - exercise: "Romanian Deadlift"
            sets: 3
            reps: "8-10"
            load: rdl
            rest: 2m
          - exercise: "Bulgarian Split Squat"
            sets: 3
            reps: "8-10 per leg"
            rest: 90s
          - exercise: "Single Leg Calf Raise"
            sets: 4
            reps: "12-15 per leg"
            rest: 60s
          - exercise: "Seated Calf Raise"
            sets: 3
            reps: "15-20"
            rest: 60s
          - exercise: "Ab Wheel / Plank"
            sets: 3
            reps: "15"
            rest: 60s

  - label: "Recovery Combo"
    slots:
      - type: run
        name: "Easy Run"
        subtype: recovery
        durationMin: 20
        segments:
          - type: easy
            duration: 20m
            pace: easy
      - type: yoga
        name: "Mobility Session"
        durationMin: 30
        focus: mobility

  - label: "Upper B"
    slots:
      - type: weights
        name: "Upper B — OHP / Push / Pull"
        focus: upper
        intent: hypertrophy
        durationMin: 60
        exercises:
          - exercise: "Barbell Overhead Press"
            sets: 4
            reps: "6-8"
            load: ohp
            rest: 2m
            progress:
              if: all_reps
              then: "ohp += 2.5"
          - exercise: "Incline DB Press"
            sets: 3
            reps: "8-10"
            load: incline_db
            rest: 90s
          - exercise: "Seated Cable Row"
            sets: 3
            reps: "10-12"
            rest: 90s
          - exercise: "Lat Pulldown"
            sets: 3
            reps: "10-12"
            rest: 90s
          - exercise: "Lateral Raise"
            sets: 3
            reps: "12-15"
            rest: 60s
          - exercise: "Tricep Pushdown"
            sets: 2
            reps: "12-15"
            rest: 60s

  - label: "Lower B"
    slots:
      - type: weights
        name: "Lower B — Deadlift / Posterior Chain"
        focus: full_body
        intent: strength
        durationMin: 65
        exercises:
          - exercise: "Barbell Deadlift"
            sets: 3
            reps: "5-6"
            load: deadlift
            rest: 3m
            progress:
              if: all_reps
              then: "deadlift += 5"
          - exercise: "Hip Thrust"
            sets: 3
            reps: "10-12"
            load: hip_thrust
            rest: 2m
          - exercise: "Nordic Curl"
            sets: 3
            reps: "3-6"
            rest: 90s
          - exercise: "Single Leg Calf Raise"
            sets: 4
            reps: "12-15 per leg"
            rest: 60s
          - exercise: "Farmer's Walk"
            sets: 3
            duration: 60s
            rest: 90s

  - label: "Recovery Optional"
    slots:
      - type: run
        name: "Optional Easy Run"
        subtype: easy
        durationMin: 20
        segments:
          - type: easy
            duration: 20m
            pace: easy
      - type: rest
        name: "Or Full Rest"
