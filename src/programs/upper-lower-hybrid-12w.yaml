schemaVersion: 1
name: "Upper/Lower Hybrid 12-Week + 10K Build (Liftosaur)"
description: "4-day upper/lower split with home+gym days, three progressive runs, and recovery yoga. Running builds toward a 10K at 8:00-8:30 min/mi by the end of 12 weeks. Run 3 loading weeks, 1 deload week, then repeat for 12 weeks total."
duration:
  type: weeks
  value: 12

vars:
  bench: 125
  incline_db_a: 35
  one_arm_row: 35
  bicep_curl: 30
  squat: 200
  rdl: 220
  split_squat: 25
  calf_load: 0
  ohp: 95
  incline_db_b: 45
  seated_row: 105
  lat_pulldown: 105
  lateral_raise: 20
  triceps_pushdown: 50
  deadlift: 265
  hip_thrust: 190
  farmers_walk: 35
  easy_miles: 2
  tempo_miles: 1
  long_miles: 3
  interval_reps: 4

days:
  - label: "Upper A + Easy Run"
    slots:
      - type: weights
        name: "Upper A"
        focus: upper
        intent: hypertrophy
        exercises:
          - exercise: "Pull Up"
            sets: 3
            reps: "6-10"
            rest: 45s
          - exercise: "Bench Press"
            sets: 3
            reps: "8-10"
            load: bench
            warmup: "30% / 40% / 50%"
            rest: 90s
            progress:
              if: all_reps
              then: "bench += 5"
          - exercise: "Incline Bench Press, Dumbbell"
            sets: 3
            reps: "8-12"
            load: incline_db_a
            warmup: "30% / 40% / 50%"
            rest: 75s
            progress:
              if: all_reps
              then: "incline_db_a += 5"
          - exercise: "Inverted Row"
            sets: 3
            reps: "15-20"
            rest: 30s
          - exercise: "Bent Over One Arm Row"
            sets: 3
            reps: "10-12"
            load: one_arm_row
            warmup: "30% / 40% / 50%"
            rest: 45s
            progress:
              if: all_reps
              then: "one_arm_row += 5"
          - exercise: "Bicep Curl"
            sets: 2
            reps: "10-12"
            load: bicep_curl
            warmup: "30% / 40% / 50%"
            rest: 45s
            progress:
              if: all_reps
              then: "bicep_curl += 5"
      - type: run
        name: "Easy Aerobic Run"
        subtype: easy
        difficulty: easy
        durationMin: 25
        notes: "Conversational pace; add distance gradually while keeping this easy."
        segments:
          - type: warmup
            duration: 5m
            pace: walk/jog
          - type: easy
            distance: "easy_miles mi"
            pace: "10:00-11:30/mi"
          - type: cooldown
            duration: 5m
            pace: walk
        progress:
          if: "session_complete and effort <= 3"
          then: "easy_miles = min(easy_miles + 0.25, 4.5)"

  - label: "Lower A (Home)"
    slots:
      - type: weights
        name: "Lower A"
        focus: legs
        intent: strength
        exercises:
          - exercise: "Squat"
            sets: 4
            reps: "6-8"
            load: squat
            warmup: "30% / 40% / 50%"
            rest: 90s
            progress:
              if: all_reps
              then: "squat += 5"
          - exercise: "Romanian Deadlift, Barbell"
            sets: 3
            reps: "8-10"
            load: rdl
            warmup: "30% / 40% / 50%"
            rest: 90s
            progress:
              if: all_reps
              then: "rdl += 5"
          - exercise: "Bulgarian Split Squat"
            sets: 3
            reps: "8-10"
            load: split_squat
            warmup: "30% / 40% / 50%"
            rest: 30s
            progress:
              if: all_reps
              then: "split_squat += 5"
          - exercise: "Standing Calf Raise, Bodyweight"
            sets: 4
            reps: "12-15"
            load: calf_load
            rest: 30s
          - exercise: "Ab Wheel"
            sets: 2
            reps: "30-60"
            rest: 60s

  - label: "Yoga Recovery"
    slots:
      - type: yoga
        name: "Runner + Lifter Mobility Yoga"
        subtype: recovery
        difficulty: easy
        durationMin: 35
        notes: "Move easily: 5m breathing, 8m hips/hamstrings, 8m calves/ankles, 8m thoracic/shoulders, 6m easy flow and relaxation."

  - label: "Upper B + 10K Pace"
    slots:
      - type: weights
        name: "Upper B"
        focus: upper
        intent: strength
        exercises:
          - exercise: "Overhead Press"
            sets: 4
            reps: "6-8"
            load: ohp
            warmup: "30% / 40% / 50%"
            rest: 90s
            progress:
              if: all_reps
              then: "ohp += 5"
          - exercise: "Incline Bench Press, Dumbbell"
            sets: 3
            reps: "8-10"
            load: incline_db_b
            warmup: "30% / 40% / 50%"
            rest: 75s
            progress:
              if: all_reps
              then: "incline_db_b += 5"
          - exercise: "Seated Row"
            sets: 3
            reps: "10-12"
            load: seated_row
            warmup: "30% / 40% / 50%"
            rest: 60s
            progress:
              if: all_reps
              then: "seated_row += 5"
          - exercise: "Lat Pulldown"
            sets: 3
            reps: "10-12"
            load: lat_pulldown
            warmup: "30% / 40% / 50%"
            rest: 75s
            progress:
              if: all_reps
              then: "lat_pulldown += 5"
          - exercise: "Lateral Raise"
            sets: 3
            reps: "12-15"
            load: lateral_raise
            warmup: "30% / 40% / 50%"
            rest: 45s
            progress:
              if: all_reps
              then: "lateral_raise += 5"
          - exercise: "Triceps Pushdown"
            sets: 2
            reps: "12-15"
            load: triceps_pushdown
            warmup: "30% / 40% / 50%"
            rest: 60s
            progress:
              if: all_reps
              then: "triceps_pushdown += 5"
      - type: run
        name: "10K Pace Progression"
        subtype: tempo
        difficulty: moderate
        durationMin: 35
        notes: "Build controlled 10K-specific work toward 8:00-8:30/mi. Start near 8:45-9:00/mi if needed and tighten the pace as effort improves."
        segments:
          - type: warmup
            distance: "1 mi"
            pace: easy
          - type: tempo
            distance: "tempo_miles mi"
            pace: "8:00-8:30/mi"
          - type: cooldown
            distance: "0.5 mi"
            pace: easy
        progress:
          if: "session_complete and effort <= 3"
          then: "tempo_miles = min(tempo_miles + 0.25, 4)"

  - label: "Lower B (Home)"
    slots:
      - type: weights
        name: "Lower B"
        focus: full_body
        intent: strength
        exercises:
          - exercise: "Deadlift"
            sets: 3
            reps: "5-6"
            load: deadlift
            warmup: "30% / 40% / 50%"
            rest: 90s
            progress:
              if: all_reps
              then: "deadlift += 10"
          - exercise: "Hip Thrust"
            sets: 3
            reps: "10-12"
            load: hip_thrust
            warmup: "30% / 40% / 50%"
            rest: 90s
            progress:
              if: all_reps
              then: "hip_thrust += 5"
          - exercise: "Nordic Curl"
            sets: 3
            reps: "3-6"
            rest: 30s
          - exercise: "Standing Calf Raise, Bodyweight"
            sets: 4
            reps: "12-15"
            load: calf_load
            rest: 30s
          - exercise: "Farmer's Walk"
            sets: 3
            reps: 40
            load: farmers_walk
            warmup: "30% / 40% / 50%"
            rest: 60s
            progress:
              if: all_reps
              then: "farmers_walk += 5"

  - label: "Long Run"
    slots:
      - type: run
        name: "Progressive Long Run"
        subtype: long
        difficulty: moderate
        durationMin: 60
        notes: "Keep most of this easy. In the final 2-3 weeks, finish the last 1-2 miles near 8:30/mi if effort stays controlled."
        segments:
          - type: warmup
            duration: 5m
            pace: walk/jog
          - type: easy
            distance: "long_miles mi"
            pace: "9:45-11:15/mi"
          - type: race_pace
            distance: "0.5 mi"
            pace: "8:00-8:30/mi"
            notes: "Optional fast finish when fresh; skip during deload or if legs are beat up."
          - type: cooldown
            duration: 5m
            pace: walk
        progress:
          if: "session_complete and effort <= 3"
          then: "long_miles = min(long_miles + 0.5, 6.2)"

  - label: "Speed Run"
    slots:
      - type: run
        name: "Intervals for 10K Strength"
        subtype: intervals
        difficulty: hard
        durationMin: 40
        notes: "Controlled reps, not all-out. Goal is to make 8:00-8:30/mi 10K pace feel sustainable."
        segments:
          - type: warmup
            distance: "1 mi"
            pace: easy
          - type: drills
            drills:
              - name: "High Knees"
                sets: 2
                duration: 20s
                rest: 20s
              - name: "Strides"
                sets: 4
                duration: 20s
                rest: 60s
          - type: interval
            distance: "400m"
            pace: "7:45-8:15/mi"
            reps: interval_reps
            rest: 90s
          - type: cooldown
            distance: "0.75 mi"
            pace: easy
        progress:
          if: "session_complete and effort <= 3"
          then: "interval_reps = min(interval_reps + 1, 8)"
